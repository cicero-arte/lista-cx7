async function analisarDispensa(imageBase64, apiKey) {
  if (!apiKey || !apiKey.startsWith("sk-ant-")) return null;
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true",
      },
      body: JSON.stringify({
        model: "claude-haiku-4-5-20251001",
        max_tokens: 1000,
        messages: [{
          role: "user",
          content: [
            {
              type: "image",
              source: { type: "base64", media_type: "image/jpeg", data: imageBase64 }
            },
            {
              type: "text",
              text: `Analise esta foto de uma dispensa/geladeira/armário e liste os produtos alimentícios e de limpeza visíveis.
Responda SOMENTE com JSON válido, sem markdown, sem explicações.
Formato: {"produtos": [{"nome": "string", "quantidade": number, "unidade": "string", "categoria": "hortifruti|carnes|laticinios|mercearia|limpeza|higiene|bebidas|padaria|congelados|outros"}]}
Se não conseguir identificar nenhum produto, retorne {"produtos": []}.
Estime a quantidade visível (número de unidades, pacotes, etc). Use unidade "un" para unidades, "kg" para peso, "L" para líquidos.`
            }
          ]
        }]
      }),
    });
    if (!res.ok) return null;
    const data = await res.json();
    const text = data.content?.find(b => b.type === "text")?.text || "";
    const start = text.indexOf("{");
    if (start === -1) return null;
    let depth = 0, jsonStr = null;
    for (let i = start; i < text.length; i++) {
      if (text[i] === "{") depth++;
      else if (text[i] === "}") { depth--; if (depth === 0) { jsonStr = text.slice(start, i+1); break; } }
    }
    if (!jsonStr) return null;
    return JSON.parse(jsonStr);
  } catch(e) { return null; }
}

// Log global de erros de busca — visível na tela
const _errosLog = [];
function addLog(msg){ _errosLog.push(msg); console.error("[busca]", msg); }

async function buscarPrecoIA(produto, cidade, raio, apiKey, tentativa = 1) {
  if (!apiKey || !apiKey.startsWith("sk-ant-")) {
    addLog("Chave inválida: " + String(apiKey).slice(0,10));
    return null;
  }
  const prompt = `Você é um pesquisador de preços de supermercado no Brasil.
Responda SOMENTE com JSON válido, sem markdown, sem explicações.
Produto: "${produto}" | Localização: ${cidade}.
Retorne o preço médio praticado no varejo dessa região.
Tente usar dados do bairro ou cidade informada. Se não tiver dados específicos, use a média do estado/UF.
Se o produto não especificar marca, retorne a marca com MENOR preço médio na região.
Se especificar marca, retorne o preço médio dessa marca na região.
Formato: {"marca":"string","categoria":"hortifruti|carnes|laticinios|mercearia|limpeza|higiene|bebidas|padaria|congelados|outros","preco_unitario":number,"unidade":"string","referencia_preco":"bairro|cidade|estado"}`;
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true",
      },
      body: JSON.stringify({
        model: "claude-haiku-4-5-20251001",
        max_tokens: 400,
        messages: [{ role: "user", content: prompt }],
      }),
    });
    if (res.status === 429) {
      addLog(`429 rate limit tentativa ${tentativa}`);
      if (tentativa <= 3) { await sleep(3000 * tentativa); return buscarPrecoIA(produto, cidade, raio, apiKey, tentativa + 1); }
      return null;
    }
    if (!res.ok) {
      const errText = await res.text();
      addLog(`HTTP ${res.status} para "${produto}": ${errText.slice(0,200)}`);
      return null;
    }
    const data = await res.json();
    if (data.error) {
      addLog(`API error para "${produto}": ${JSON.stringify(data.error)}`);
      return null;
    }
    const text = data.content?.find(b => b.type === "text")?.text || "";
    if (!text) { addLog(`Resposta vazia para "${produto}"`); return null; }
    const clean = text.replace(/\`\`\`json|\`\`\`/g, "").trim();
    // Extrai o primeiro objeto JSON balanceado (evita erro com múltiplos objetos)
    let jsonStr = null;
    const start = clean.indexOf("{");
    if (start !== -1) {
      let depth = 0;
      for (let i = start; i < clean.length; i++) {
        if (clean[i] === "{") depth++;
        else if (clean[i] === "}") { depth--; if (depth === 0) { jsonStr = clean.slice(start, i+1); break; } }
      }
    }
    if (!jsonStr) {
      addLog(`JSON não encontrado para "${produto}": ${clean.slice(0,100)}`);
      if (tentativa <= 2) { await sleep(1000); return buscarPrecoIA(produto, cidade, raio, apiKey, tentativa + 1); }
      return null;
    }
    const resultado = JSON.parse(jsonStr);
    addLog(`OK: "${produto}" → ${resultado.preco_unitario} ${resultado.unidade||""} · ${resultado.marca||""} (ref: ${resultado.referencia_preco||"estado"})`);
    return resultado;
  } catch(e) {
    addLog(`Exceção para "${produto}": ${e.message}`);
    return null;
  }
}

<tbody>${itens.map((it,i)=>`<tr><td>${i+1}</td><td>${it.nome}</td><td>${it.marca||"—"}</td>
<td>${CATS[it.categoria]?.label||it.categoria}</td><td>${it.qtd}</td><td>${it.unidade||"un"}</td>
<td>${it.preco?fmt(it.preco):"—"}</td><td>${it.preco?fmt(it.preco*it.qtd):"—"}</td>

  const w = window.open("","_blank");
  if(w){w.document.write(html);w.document.close();setTimeout(()=>w.print(),600);}

            {item.comprado?"✓":""}
          </button>
        ) : (
          <div style={{width:24,height:24,borderRadius:7,flexShrink:0,
            background:cat.cor+"22",border:`2px solid ${cat.cor}66`}}></div>
        )}

        <div style={{flex:1,minWidth:0,cursor:"pointer"}} onClick={onOpen}>
          <div style={{fontSize:"var(--fz)",
            color: isComprado ? "#4ade80" : "var(--text)",
            whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
            {item.nome}
            {item.marca?<span style={{fontSize:"var(--fz-sm)",opacity:.7}}> · {item.marca}</span>:null}
          </div>
          {aba==="compras" && (
            <div style={{fontSize:"var(--fz-sm)",marginTop:2,display:"flex",gap:6,flexWrap:"wrap"}}>
              {subtotal&&(
                <span style={{color: isComprado ? "#4ade8099" : "#fbbf2488"}}>
                  {fmt(item.preco)}/un · <strong style={{color: isComprado ? "#4ade80" : "#fbbf24"}}>{fmt(subtotal)}</strong>
                  {!isComprado&&item.referencia_preco&&(
                    <span style={{color:"var(--text3)",marginLeft:4}}>
                      (est. {item.referencia_preco})
                    </span>
                  )}
                </span>
              )}
              {!item.preco&&<span style={{color:"var(--text3)"}}>— sem preço estimado</span>}
            </div>
          )}
          {aba==="estoque" && (
            <div style={{fontSize:"var(--fz-sm)",color:qtdEst===0?"#f87171":"#4ade8066",marginTop:1}}>
              {qtdEst===0?"⚠ zerado":(CATS[item.categoria]?.label||"outros")}
            </div>
          )}
        </div>

        {aba==="compras" ? (
          <input value={qtdLocal} onChange={e=>handleQtd(e.target.value)}
            type="number" min="0.1" step="0.1"
            style={{width:44,background:"var(--input)",border:"1px solid var(--border)",borderRadius:6,
              padding:"4px",color:"var(--text)",fontSize:"var(--fz-sm)",outline:"none",textAlign:"center",
              fontFamily:"inherit",MozAppearance:"textfield",WebkitAppearance:"none"}}/>
        ) : (
          <div style={{display:"flex",alignItems:"center",flexShrink:0}}>
            <button onClick={dec} style={{width:30,height:30,borderRadius:"6px 0 0 6px",
              background:"var(--bg3)",border:"1px solid var(--border)",borderRight:"none",
              color:"var(--text)",fontSize:"var(--fz-xl)",cursor:"pointer",fontFamily:"inherit",
              display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
            <div style={{width:32,height:30,background:"var(--input)",border:"1px solid var(--border)",
              display:"flex",alignItems:"center",justifyContent:"center",fontSize:"var(--fz)",fontWeight:700,
              color:qtdEst===0?"#f87171":"#4ade80"}}>{qtdEst}</div>
            <button onClick={inc} style={{width:30,height:30,borderRadius:"0 6px 6px 0",
              background:"var(--bg3)",border:"1px solid var(--border)",borderLeft:"none",
              color:"var(--text)",fontSize:"var(--fz-xl)",cursor:"pointer",fontFamily:"inherit",
              display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
          </div>
        )}

        <button onClick={onRemove} style={{background:"none",border:"none",color:"#2a2a2a",
          cursor:"pointer",fontSize:"var(--fz-xl)",padding:"0 2px",flexShrink:0,fontFamily:"inherit"}}
          onTouchStart={e=>e.currentTarget.style.color="#f87171"}
          onTouchEnd={e=>e.currentTarget.style.color="#2a2a2a"}
          onMouseEnter={e=>e.currentTarget.style.color="#f87171"}
          onMouseLeave={e=>e.currentTarget.style.color="#2a2a2a"}>×</button>
      </div>
    </div>
  );
}

// ── DETALHE MODAL ──
function DetalheModal({item,onClose,onUpdate,config}) {
  const [local,setLocal] = useState({...item});
  const save = (patch) => { setLocal(l=>({...l,...patch})); onUpdate(patch); };
  const isEstoque = item._lista==="estoque";


  return (
    <Modal onClose={onClose} title={local.nome}>
      <div style={{marginBottom:12}}>
        <div style={{fontSize:"var(--fz-xs)",color:"var(--text3)",letterSpacing:2,textTransform:"uppercase",marginBottom:6}}>Categoria</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:12}}>
          {Object.entries(CATS).map(([key,cat])=>(
            <Chip key={key} label={cat.label} ativo={local.categoria===key} cor={cat.cor}
              onClick={()=>save({categoria:key})}/>
          ))}
        </div>
      </div>

      {isEstoque && (
        <>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:"var(--fz-xs)",color:"var(--text3)",letterSpacing:2,textTransform:"uppercase",marginBottom:3}}>Nome</div>
            <input value={local.nome||""} onChange={e=>save({nome:e.target.value})}
              style={{width:"100%",background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:6,
                padding:"7px 10px",color:"var(--text)",fontSize:"var(--fz)",outline:"none",boxSizing:"border-box",fontFamily:"inherit"}}/>
          </div>
          <div style={{background:"var(--bg3)",borderRadius:8,padding:"14px",marginBottom:14,border:"1px solid var(--border)"}}>
            <div style={{fontSize:"var(--fz-xs)",color:"var(--text3)",letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>Quantidade em estoque</div>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <button onClick={()=>save({qtdEstoque:Math.max(0,(local.qtdEstoque||0)-1)})}
                style={{width:36,height:36,borderRadius:8,background:"var(--border)",border:"none",color:"var(--text)",fontSize:"var(--fz-xl)",cursor:"pointer",fontFamily:"inherit"}}>−</button>
              <input value={local.qtdEstoque??0} type="number" min="0"
                onChange={e=>save({qtdEstoque:parseFloat(e.target.value)||0})}
                style={{flex:1,background:"var(--input)",border:"1px solid #333",borderRadius:8,padding:"10px",
                  color:"#fbbf24",fontSize:"var(--fz-xl)",fontWeight:700,outline:"none",textAlign:"center",fontFamily:"inherit"}}/>
              <button onClick={()=>save({qtdEstoque:(local.qtdEstoque||0)+1})}
                style={{width:36,height:36,borderRadius:8,background:"var(--border)",border:"none",color:"var(--text)",fontSize:"var(--fz-xl)",cursor:"pointer",fontFamily:"inherit"}}>+</button>
            </div>
            <div style={{fontSize:"var(--fz-xs)",color:local.qtdEstoque===0?"#f87171":"#4ade80",marginTop:8,textAlign:"center"}}>
              {local.qtdEstoque===0?"⚠ Zerado — entrará na lista de compras":"✓ Em estoque"}
            </div>
          </div>
        </>
      )}

      {!isEstoque && (
        <>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:"var(--fz-xs)",color:"var(--text3)",letterSpacing:2,textTransform:"uppercase",marginBottom:3}}>Nome</div>
            <input value={local.nome||""} onChange={e=>save({nome:e.target.value})}
              style={{width:"100%",background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:6,
                padding:"7px 10px",color:"var(--text)",fontSize:"var(--fz)",outline:"none",boxSizing:"border-box",fontFamily:"inherit"}}/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
            {[["Marca","marca",local.marca],["Unidade","unidade",local.unidade],
              ["Preço unit. (R$)","preco",local.preco]
            ].map(([label,key,val])=>(
              <div key={key}>
                <div style={{fontSize:"var(--fz-xs)",color:"var(--text3)",letterSpacing:2,textTransform:"uppercase",marginBottom:3}}>{label}</div>
                <input
                  value={key==="preco" && val ? String(val).replace(".",",") : val||""}
                  onChange={e=>{
                    const raw = e.target.value;
                    if(key==="preco"){
                      // Vírgula como separador decimal (padrão brasileiro)
                      const normalized = raw.replace(",",".");
                      const num = parseFloat(normalized);
                      save({[key]: raw===""?null: isNaN(num)?null:num});
                    } else {
                      save({[key]:raw});
                    }
                  }}
                  type="text"
                  inputMode={key==="preco"?"decimal":"text"}
                  placeholder={key==="preco"?"0,00":""}
                  style={{width:"100%",background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:6,
                    padding:"7px 10px",color:"var(--text)",fontSize:"var(--fz)",outline:"none",boxSizing:"border-box",fontFamily:"inherit"}}/>
              </div>
            ))}
          </div>

          {local.preco&&(
            <div style={{background:"var(--bg3)",borderRadius:8,padding:"10px 14px",marginBottom:14}}>
              <div style={{fontSize:"var(--fz-sm)",color:"var(--text3)"}}>Subtotal</div>
              <div style={{fontSize:"var(--fz-xl)",fontWeight:700,color:"#fbbf24"}}>{fmt(local.preco*local.qtd)}</div>
              <div style={{fontSize:"var(--fz-xs)",color:"var(--text3)"}}>{local.qtd} × {fmt(local.preco)}</div>
            </div>
          )}

        </>
      )}
    </Modal>
  );
}

// ── CATEGORY EDITOR ──
const CORES_OPCOES = ["#4ade80","#f87171","#fbbf24","#60a5fa","#a78bfa","#34d399","#fb923c","#e879f9","#38bdf8","#94a3b8","#f472b6","#facc15","#2dd4bf","#818cf8"];

function CatEditor({cats,onChange}) {
  const [editKey,setEditKey] = useState(null);
  const [editData,setEditData] = useState({});
  const [novaLabel,setNovaLabel] = useState("");

  const abrirEdicao = (key) => {
    setEditKey(key); setEditData({...cats[key]});
  };
  const salvarEdicao = () => {
    if(!editData.label?.trim()) return;
    onChange({...cats,[editKey]:{...cats[editKey],...editData}});
    setEditKey(null);
  };
  const excluir = (key) => {
    const novo={...cats}; delete novo[key]; onChange(novo);
    setEditKey(null);
  };
  const adicionar = () => {
    if(!novaLabel.trim()) return;
    const key = novaLabel.toLowerCase().replace(/\s+/g,"_").replace(/[^a-z0-9_]/g,"") + "_" + Date.now();
    const cores = CORES_OPCOES;
    const cor = cores[Object.keys(cats).length % cores.length];
    onChange({...cats,[key]:{label:novaLabel.trim(),emoji:novaEmoji,cor}});
    setNovaLabel("");
  };

  return (
    <div>
      {Object.entries(cats).map(([key,cat])=>(
        <div key={key}>
          {editKey===key ? (
            <div style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:8,padding:"10px",marginBottom:8}}>
              <div style={{display:"flex",gap:8,marginBottom:8}}>
                <input value={editData.label||""} onChange={e=>setEditData(d=>({...d,label:e.target.value}))}
                  placeholder="Nome da categoria"
                  style={{flex:1,background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:6,
                    padding:"8px 10px",color:"var(--text)",fontSize:"var(--fz)",outline:"none",fontFamily:"inherit"}}/>
              </div>
              <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:8}}>
                {CORES_OPCOES.map(c=>(
                  <div key={c} onClick={()=>setEditData(d=>({...d,cor:c}))}
                    style={{width:22,height:22,borderRadius:11,background:c,cursor:"pointer",
                      border:editData.cor===c?"3px solid var(--text)":"3px solid transparent"}}/>
                ))}
              </div>
              <div style={{display:"flex",gap:6}}>
                <button onClick={salvarEdicao} style={{flex:1,padding:"7px",background:"#fbbf24",border:"none",
                  borderRadius:6,color:"#0c0c0c",fontWeight:700,fontSize:"var(--fz-sm)",cursor:"pointer",fontFamily:"inherit"}}>✓ Salvar</button>
                <button onClick={()=>setEditKey(null)} style={{padding:"7px 10px",background:"var(--bg3)",border:"none",
                  borderRadius:6,color:"var(--text)",fontSize:"var(--fz-sm)",cursor:"pointer",fontFamily:"inherit"}}>✕</button>
                <button onClick={()=>excluir(key)} style={{padding:"7px 10px",background:"none",border:"1px solid #f8717140",
                  borderRadius:6,color:"#f87171",fontSize:"var(--fz-sm)",cursor:"pointer",fontFamily:"inherit"}}>🗑</button>
              </div>
            </div>
          ) : (
            <div onClick={()=>abrirEdicao(key)}
              style={{display:"flex",alignItems:"center",gap:10,padding:"9px 10px",marginBottom:6,
                background:"var(--bg2)",borderRadius:8,border:"1px solid var(--border)",cursor:"pointer"}}>
              <div style={{width:12,height:12,borderRadius:6,background:cat.cor,flexShrink:0}}/>
              <span style={{flex:1,fontSize:"var(--fz)",color:"var(--text)"}}>{cat.label}</span>
              <span style={{color:"var(--text3)",fontSize:"var(--fz-sm)"}}>✎</span>
            </div>
          )}
        </div>
      ))}

      {/* Nova categoria */}
      <div style={{marginTop:10,background:"var(--bg2)",border:"1px dashed var(--border)",borderRadius:8,padding:"10px"}}>
        <div style={{fontSize:"var(--fz-xs)",color:"var(--text3)",letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>Nova categoria</div>
        <div style={{display:"flex",gap:8,marginBottom:8}}>
          <input value={novaLabel} onChange={e=>setNovaLabel(e.target.value)} placeholder="Nome da categoria"
            style={{flex:1,background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:6,
              padding:"8px 10px",color:"var(--text)",fontSize:"var(--fz)",outline:"none",fontFamily:"inherit"}}/>
        </div>
        <button onClick={adicionar} disabled={!novaLabel.trim()} style={{
          width:"100%",padding:"8px",background:novaLabel.trim()?"#fbbf24":"var(--bg3)",
          border:"none",borderRadius:6,color:novaLabel.trim()?"#0c0c0c":"var(--text3)",
          fontWeight:700,fontSize:"var(--fz-sm)",cursor:novaLabel.trim()?"pointer":"default",fontFamily:"inherit"}}>
          + Adicionar categoria
        </button>
      </div>
    </div>
  );
}

// ── RODAPÉ ──
function Rodape({compras,config,onPrint,onBuscar,buscando,buscandoNome,onVerLog,onEnviarEstoque}) {
  const estimativaTotal = compras.filter(i=>i.preco).reduce((a,i)=>a+i.preco*i.qtd,0);
  const estimativaComprados = compras.filter(i=>i.comprado&&i.preco).reduce((a,i)=>a+i.preco*i.qtd,0);
  const realComprados = compras.filter(i=>i.comprado&&i.preco).reduce((a,i)=>a+i.preco*i.qtd,0);
  const pendentes = compras.filter(i=>!i.comprado).length;
  const nComprados = compras.filter(i=>i.comprado).length;
  return (
    <div style={{padding:"12px 16px 0"}}>
      <div style={{background:"var(--bg2)",borderRadius:12,padding:"14px",border:"1px solid var(--border)",marginBottom:10}}>
        {/* Linha de estimativa total */}
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:8,paddingBottom:8,borderBottom:"1px solid var(--border)"}}>
          <span style={{fontSize:"var(--fz-sm)",color:"var(--text3)"}}>Estimativa total</span>
          <span style={{fontSize:"var(--fz-lg)",fontWeight:700}}>{fmt(estimativaTotal)}</span>
        </div>
        {/* Comprados: real vs estimativa */}
        {nComprados>0&&(
          <div style={{marginBottom:8,paddingBottom:8,borderBottom:"1px solid var(--border)"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
              <span style={{fontSize:"var(--fz-sm)",color:"#4ade80"}}>Comprado ({nComprados} itens)</span>
              <span style={{fontSize:"var(--fz)",fontWeight:700,color:"#4ade80"}}>{fmt(realComprados)}</span>
            </div>
            <div style={{display:"flex",justifyContent:"space-between"}}>
              <span style={{fontSize:"var(--fz-xs)",color:"var(--text3)"}}>Estimativa dos comprados</span>
              <span style={{fontSize:"var(--fz-xs)",color:"var(--text3)"}}>{fmt(estimativaComprados)}</span>
            </div>
          </div>
        )}
        {/* Pendentes */}
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:config.limite>0?6:0}}>
          <span style={{fontSize:"var(--fz-sm)",color:"#fbbf24"}}>{pendentes} itens pendentes</span>
          <span style={{fontSize:"var(--fz-sm)",color:"#fbbf24"}}>{fmt(estimativaTotal-estimativaComprados)}</span>
        </div>
        {config.limite>0&&(
          <div style={{fontSize:"var(--fz-xs)",color:"var(--text3)",textAlign:"right"}}>
            limite: {fmt(config.limite)} ({Math.round((estimativaTotal/config.limite)*100)}%)
          </div>
        )}
      </div>
      <button onClick={onBuscar} disabled={buscando} style={{
        ...btnSec, marginBottom:8,
        color: buscando ? "var(--text3)" : "#fbbf24",
        borderColor: buscando ? "var(--border)" : "#fbbf2466",
      }}>
        {buscando ? `Buscando ${buscandoNome||"..."}` : "Pesquisar preços"}
      </button>
      <button onClick={onVerLog} style={{...btnSec,marginBottom:8,fontSize:"var(--fz-sm)",color:"var(--text3)"}}>
        Ver log de pesquisa
      </button>
      <button onClick={onPrint} style={{...btnSec,marginBottom:8}}>Imprimir lista</button>
    </div>
  );
}

// ── GOOGLE DRIVE SYNC ──
const GOOGLE_CLIENT_ID = "556568463566-fca3135da3jcem30hv13m4nc82td9gel.apps.googleusercontent.com";
const DRIVE_FILE_NAME = "compras-casa-sync.json";
const SCOPES = "https://www.googleapis.com/auth/drive.appdata";

let gapiReady = false;
let tokenClient = null;

function initGapi(callback) {
  if (gapiReady) { callback(); return; }
  gapi.load("client", async () => {
    await gapi.client.init({});
    await gapi.client.load("https://www.googleapis.com/discovery/v1/apis/drive/v3/rest");
    gapiReady = true;
    callback();
  });
}

function getTokenAndRun(callback) {
  if (!tokenClient) {
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: GOOGLE_CLIENT_ID,
      scope: SCOPES,
      callback: (resp) => {
        if (resp.error) { console.error(resp); return; }
        callback();
      },
    });
  }
  if (gapi.client.getToken() === null) {
    tokenClient.requestAccessToken({ prompt: "consent" });
  } else {
    callback();
  }
}

async function getDriveFileId() {
  const res = await gapi.client.drive.files.list({
    spaces: "appDataFolder",
    fields: "files(id,name)",
    q: `name='${DRIVE_FILE_NAME}'`,
  });
  const files = res.result.files;
  return files && files.length > 0 ? files[0].id : null;
}

async function saveToDrive(data) {
  const body = JSON.stringify(data);
  const fileId = await getDriveFileId();
  if (fileId) {
    await gapi.client.request({
      path: `/upload/drive/v3/files/${fileId}`,
      method: "PATCH",
      params: { uploadType: "media" },
      body,
    });
  } else {
    await gapi.client.request({
      path: "/upload/drive/v3/files",
      method: "POST",
      params: { uploadType: "multipart" },
      headers: { "Content-Type": 'multipart/related; boundary="boundary"' },
      body: [
        '--boundary',
        'Content-Type: application/json',
        '',
        JSON.stringify({ name: DRIVE_FILE_NAME, parents: ["appDataFolder"] }),
        '--boundary',
        'Content-Type: application/json',
        '',
        body,
        '--boundary--',
      ].join("\r\n"),
    });
  }
}

async function loadFromDrive() {
  const fileId = await getDriveFileId();
  if (!fileId) return null;
  const res = await gapi.client.drive.files.get({
    fileId,
    alt: "media",
  });
  return typeof res.result === "string" ? JSON.parse(res.result) : res.result;
}

function App() {
  const [config,setConfig]   = useState(()=>LS.get("cfg_v1",DEFAULT_CONFIG));
  const [compras,setCompras] = useState(()=>LS.get("compras_v3",[]));

  const total = compras.filter(i=>i.preco).reduce((a,i)=>a+i.preco*i.qtd,0);
  const totalComprado = compras.filter(i=>i.comprado&&i.preco).reduce((a,i)=>a+i.preco*i.qtd,0);
  const pct = config.limite>0?(total/config.limite)*100:0;

  const ultrapassou = pct>=100;

    if(filtros.busca&&!it.nome.toLowerCase().includes(filtros.busca.toLowerCase())&&
      !(it.marca||"").toLowerCase().includes(filtros.busca.toLowerCase())) return false;
    if(filtros.cat.length&&!filtros.cat.includes(it.categoria)) return false;
    if(filtros.mercado&&(it.mercado_nome||"").toLowerCase()!==filtros.mercado.toLowerCase()) return false;
    if(filtros.marca&&(it.marca||"").toLowerCase()!==filtros.marca.toLowerCase()) return false;
    return true;
  });

  // Sinc estoque → compras
  // Etapa 1: apenas adiciona/remove itens na lista, marcando novos com _pendenteBusca:true
  useEffect(()=>{
    if(!config.sincEstoque) return;
    setCompras(prev=>{
      let lst=[...prev];
      estoque.forEach(ei=>{
        const nl=ei.nome.toLowerCase();
        const idx=lst.findIndex(c=>c.nome.toLowerCase()===nl);
        const jaEsta=idx!==-1;
        if(ei.qtdEstoque===0&&!jaEsta){
          lst=[...lst,{id:uid(),nome:ei.nome,categoria:ei.categoria||"outros",qtd:1,

            _fromEstoque:true,_pendenteBusca:true}];
        } else if(ei.qtdEstoque>=1&&jaEsta){
          lst=lst.filter((_,i)=>i!==idx);
        }
      });
      return lst;
    });
  },[estoque,config.sincEstoque]);



  const handleAdd = async()=>{
    if(!addNome.trim()) return;
    const target=addTarget, nome=addNome.trim(), qtd=parseFloat(addQtd)||1;
    setAddNome(""); setModal(null);
    if(target==="estoque"){
      setEstoque(p=>[...p,{id:uid(),nome,categoria:"outros",qtd,unidade:"un",qtdEstoque:qtd,adicionadoEm:Date.now()}]);
      return;

    setBuscando(true);
    setBuscandoNome(nome);
    const r=await buscarPrecoIA(nome,config.cidade,config.raio,config.apiKey);
    setBuscando(false);
    setBuscandoNome("");
    if(r) setCompras(prev=>prev.map(it=>it.id!==novoItem.id?it:{...it,
      marca:r.marca||it.marca,categoria:r.categoria||it.categoria,
      preco:r.preco_unitario||it.preco,unidade:r.unidade||it.unidade,
      referencia_preco:r.referencia_preco||"estado"}));
  };

  const gerarBackup=()=>{
    const ts=new Date().toISOString().replace(/[:.]/g,"-").slice(0,19);
    const blob=new Blob([JSON.stringify({gerado:fmtDate(Date.now()),config,compras,estoque},null,2)],{type:"application/json"});

    const a=document.createElement("a"); a.href=url; a.download=`compras-backup-${ts}.json`; a.click();
    URL.revokeObjectURL(url);
  };

  const importarBackup=(e)=>{
    const file=e.target.files?.[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(d.compras) setCompras(d.compras);
        if(d.estoque) setEstoque(d.estoque);
        if(d.config) setConfig(d.config);
      } catch{}
    };
    reader.readAsText(file);
    setModal(null);
  };

  const mercadosUnicos=[];
  const marcasUnicas=[...new Set(lista.map(i=>i.marca).filter(Boolean))];
  const abrirDetalhe=(item)=>{setItemSel(item);setModal("detalhe");};
  // Botão "Pesquisar preços" — busca todos os itens sem preço na lista de compras
  const sincronizarDrive = async (dadosParaSalvar) => {
    if (!driveConectado) return;
    try {
      setDriveStatus("sincronizando");
      await saveToDrive(dadosParaSalvar || { compras, estoque, config });

    const file = e.target.files?.[0];

    if (!config.apiKey?.startsWith("sk-ant-")) {
      alert("Configure a chave API em Config → Pesquisa de preços.");
      return;

    // Convert to base64
    const reader = new FileReader();

      const base64 = ev.target.result.split(",")[1];

      setProdutosIdentificados([]);

        alert("Não consegui identificar produtos. Tente uma foto com melhor iluminação e produtos mais visíveis.");
      }
    };
    reader.readAsDataURL(file);
  };

  const confirmarProdutosIdentificados = () => {
    const novos = produtosIdentificados
      .filter((_, i) => produtosSelecionados[i])

        id: uid(), nome: p.nome, categoria: p.categoria || "outros",

        qtdEstoque: p.quantidade || 1, adicionadoEm: Date.now(),

    setEstoque(prev => {
      let est = [...prev];
      novos.forEach(novo => {
        const idx = est.findIndex(e => e.nome.toLowerCase() === novo.nome.toLowerCase());

      return;

    const semPreco = compras.filter(it => !it.preco && !it.comprado);

      {(aba==="compras"||aba==="estoque")&&(
        <div style={{display:"flex",flexDirection:"column",flex:1,overflow:"hidden"}}>
        <div style={{background:"var(--bg)",borderBottom:"1px solid var(--border)",flexShrink:0,
          overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
          <div style={{padding:"10px 16px 10px",display:"flex",gap:6,minWidth:"max-content"}}>
            <Chip label="Todos" ativo={!filtros.cat.length} cor="#fbbf24" onClick={()=>setFiltros(f=>({...f,cat:[]}))}/>
            {Object.entries(CATS).map(([key,cat])=>{
              const n=lista.filter(i=>i.categoria===key).length; if(!n) return null;
              const ativo=filtros.cat.includes(key);
              return <Chip key={key} label={`${cat.label} ${n}`} ativo={ativo} cor={cat.cor}
                onClick={()=>setFiltros(f=>({...f,cat:ativo?f.cat.filter(c=>c!==key):[...f.cat,key]}))}/>;
            })}
          </div>
        </div>
        <div style={{flex:1,overflowY:"auto",paddingBottom:100}}>
          <div style={{padding:"0 16px"}}>
            {itensFiltrados.filter(i=>!i.comprado).length===0&&itensFiltrados.filter(i=>i.comprado).length===0&&<Empty aba={aba}/>}
            {itensFiltrados.filter(i=>!i.comprado).map(item=>(
              <ItemCard key={item.id} item={item} aba={aba}
                onToggle={()=>toggleComprado(item,aba)}
                onRemove={()=>setLista(p=>p.filter(i=>i.id!==item.id))}
                onOpen={()=>abrirDetalhe({...item,_lista:aba})}
                onQtdChange={q=>atualizarItem(item.id,{qtd:q},aba)}
                onQtdEstoqueChange={q=>atualizarItem(item.id,{qtdEstoque:q},aba)}/>
            ))}
            {aba==="compras"&&itensFiltrados.filter(i=>i.comprado).length>0&&(
              <>
                <SectionHead label={`Comprados (${itensFiltrados.filter(i=>i.comprado).length})`}
                  right={<button onClick={enviarParaEstoque}
                    style={{background:"#4ade8022",border:"1px solid #4ade8044",color:"#4ade80",
                      fontSize:"var(--fz-sm)",cursor:"pointer",fontFamily:"inherit",borderRadius:6,padding:"3px 8px"}}>
                    Enviar ao estoque ✓</button>}/>
                {itensFiltrados.filter(i=>i.comprado).map(item=>(
                  <ItemCard key={item.id} item={item} aba={aba}
                    onToggle={()=>toggleComprado(item,aba)}
                    onRemove={()=>setLista(p=>p.filter(i=>i.id!==item.id))}
                    onOpen={()=>abrirDetalhe({...item,_lista:aba})}
                    onQtdChange={q=>atualizarItem(item.id,{qtd:q},aba)}
                    onQtdEstoqueChange={q=>atualizarItem(item.id,{qtdEstoque:q},aba)}/>
                ))}
              </>
            )}
          </div>
          {aba==="compras"&&<Rodape compras={compras} config={config} onPrint={()=>printLista(compras,"Lista de Compras",config)} onBuscar={buscarTodos} buscando={buscando} buscandoNome={buscandoNome} onVerLog={()=>setModal('log')} onEnviarEstoque={enviarParaEstoque}/>}
          {aba==="estoque"&&(
          <div style={{padding:"12px 16px",display:"flex",flexDirection:"column",gap:8}}>
            <label style={{...btnSec,textAlign:"center",cursor:"pointer",
              color:"#fbbf24",borderColor:"#fbbf2466",display:"block"}}>
              {analisando ? "Analisando foto..." : "Fotografar dispensa"}
              <input type="file" accept="image/*" capture="environment"
                onChange={handleFoto} style={{display:"none"}}/>
            </label>
            <button onClick={()=>printLista(estoque,"Estoque",config)} style={btnSec}>Imprimir estoque</button>
          </div>
        )}
        </div>
        </div>
      )}

      {aba==="config"&&(
        <ConfigPane config={config} setConfig={setConfig}
          onSincChange={v=>setConfig(c=>({...c,sincEstoque:v}))}
          onClearCompras={()=>setCompras([])}
          onClearEstoque={()=>setEstoque([])}
          onBackup={gerarBackup}
          onRestore={importarBackup}
          onPrintCompras={()=>printLista(compras,"Lista de Compras",config)}
          onPrintEstoque={()=>printLista(estoque,"Estoque",config)}
          driveConectado={driveConectado}
          onConectarDrive={conectarDrive}
          onSincronizarDrive={()=>sincronizarDrive()}/>
      )}

      {/* FAB */}
      {(aba==="compras"||aba==="estoque")&&(
        <button onClick={()=>{setAddTarget(aba);setModal("add");}} style={{
          position:"fixed",bottom:24,right:20,width:52,height:52,borderRadius:26,
          background:"#fbbf24",border:"none",color:"#0c0c0c",fontSize:"var(--fz-xl)",cursor:"pointer",
          boxShadow:"0 4px 20px #fbbf2466",display:"flex",alignItems:"center",justifyContent:"center",zIndex:60}}>+</button>
      )}

      {/* MODAL ADD */}
      {modal==="add"&&(
        <Modal onClose={()=>setModal(null)} title={`Adicionar à ${addTarget==="compras"?"lista":"estoque"}`}>
          <Inp label="Nome do produto" value={addNome} onChange={e=>setAddNome(e.target.value)} placeholder="ex: Arroz 5kg"/>
          <Inp label="Quantidade" value={addQtd} onChange={e=>setAddQtd(e.target.value)} type="number"/>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:"var(--fz-xs)",color:"var(--text3)",letterSpacing:2,textTransform:"uppercase",marginBottom:6}}>Adicionar em</div>
            <div style={{display:"flex",gap:8}}>
              <Chip label="Compras" ativo={addTarget==="compras"} cor="#fbbf24" onClick={()=>setAddTarget("compras")}/>
              <Chip label="Estoque" ativo={addTarget==="estoque"} cor="#60a5fa" onClick={()=>setAddTarget("estoque")}/>
            </div>
          </div>
          {config.apiKey?.startsWith("sk-ant-")
            ? <p style={{fontSize:"var(--fz-sm)",color:"#4ade8088",marginBottom:14}}>✓ IA buscará marca, preço e mercado em {config.cidade} ({config.raio}km).</p>
            : <p style={{fontSize:"var(--fz-sm)",color:"#f8717188",marginBottom:14}}>⚠ Sem chave API — sem pesquisa automática. Configure em Config.</p>
          }
          <button onClick={handleAdd} disabled={!addNome.trim()} style={{
            width:"100%",padding:"12px",background:addNome.trim()?"#fbbf24":"#2a2a2a",border:"none",
            borderRadius:8,color:addNome.trim()?"#0c0c0c":"var(--text3)",fontWeight:700,fontSize:"var(--fz)",
            cursor:addNome.trim()?"pointer":"default",letterSpacing:1,textTransform:"uppercase",fontFamily:"inherit"}}>
            Adicionar{addTarget==="compras"?" + Buscar preço":""}
          </button>
        </Modal>
      )}

      {/* MODAL DETALHE */}
      {modal==="detalhe"&&itemSel&&(
        <DetalheModal item={itemSel} onClose={()=>setModal(null)}
          onUpdate={patch=>{atualizarItem(itemSel.id,patch,itemSel._lista);setItemSel(s=>({...s,...patch}));}}
          config={config}/>
      )}

      {/* MODAL FILTRO */}
      {modal==="filtro"&&(
        <Modal onClose={()=>setModal(null)} title="Filtros">
          <Inp label="Buscar" value={filtros.busca} onChange={e=>setFiltros(f=>({...f,busca:e.target.value}))} placeholder="Pesquisar…"/>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:"var(--fz-xs)",color:"var(--text3)",letterSpacing:2,textTransform:"uppercase",marginBottom:6}}>Categoria</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {Object.entries(CATS).map(([key,cat])=>(
                <Chip key={key} label={cat.label} ativo={filtros.cat.includes(key)} cor={cat.cor}
                  onClick={()=>setFiltros(f=>({...f,cat:f.cat.includes(key)?f.cat.filter(c=>c!==key):[...f.cat,key]}))}/>
              ))}
            </div>
          </div>
          {mercadosUnicos.length>0&&(
            <div style={{marginBottom:14}}>
              <div style={{fontSize:"var(--fz-xs)",color:"var(--text3)",letterSpacing:2,textTransform:"uppercase",marginBottom:6}}>Mercado</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                <Chip label="Todos" ativo={!filtros.mercado} cor="var(--text3)" onClick={()=>setFiltros(f=>({...f,mercado:""}))}/>
                {mercadosUnicos.map(m=><Chip key={m} label={m} ativo={filtros.mercado===m} cor="#60a5fa"
                  onClick={()=>setFiltros(f=>({...f,mercado:f.mercado===m?"":m}))}/>)}
              </div>
            </div>
          )}
          {marcasUnicas.length>0&&(
            <div style={{marginBottom:14}}>
              <div style={{fontSize:"var(--fz-xs)",color:"var(--text3)",letterSpacing:2,textTransform:"uppercase",marginBottom:6}}>Marca</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                <Chip label="Todas" ativo={!filtros.marca} cor="var(--text3)" onClick={()=>setFiltros(f=>({...f,marca:""}))}/>
                {marcasUnicas.map(m=><Chip key={m} label={m} ativo={filtros.marca===m} cor="#a78bfa"
                  onClick={()=>setFiltros(f=>({...f,marca:f.marca===m?"":m}))}/>)}
              </div>
            </div>
          )}
          <button onClick={()=>{setFiltros({cat:[],mercado:"",marca:"",busca:""});setModal(null);}}
            style={{...btnSec,color:"#f87171",borderColor:"#f8717140"}}>Limpar filtros</button>
        </Modal>
      )}


      {/* MODAL CONFIRMAÇÃO PRODUTOS IDENTIFICADOS */}
      {produtosIdentificados.length>0&&(
        <Modal onClose={()=>{setProdutosIdentificados([]);setProdutosSelecionados({});}} title="Produtos identificados">
          <p style={{fontSize:"var(--fz-sm)",color:"var(--text2)",marginBottom:14}}>
            Selecione os produtos para adicionar ao estoque:
          </p>
          <div style={{marginBottom:16}}>
            {produtosIdentificados.map((p,i)=>(
              <div key={i} onClick={()=>setProdutosSelecionados(s=>({...s,[i]:!s[i]}))}
                style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",
                  borderBottom:"1px solid var(--border)",cursor:"pointer",
                  opacity:produtosSelecionados[i]?1:0.4}}>
                <div style={{width:22,height:22,borderRadius:6,flexShrink:0,
                  border:`2px solid ${produtosSelecionados[i]?"#4ade80":"var(--border)"}`,
                  background:produtosSelecionados[i]?"#4ade8022":"transparent",
                  display:"flex",alignItems:"center",justifyContent:"center",
                  color:"#4ade80",fontSize:"var(--fz-sm)"}}>
                  {produtosSelecionados[i]?"✓":""}
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:"var(--fz)",color:"var(--text)"}}>{p.nome}</div>
                  <div style={{fontSize:"var(--fz-sm)",color:"var(--text3)"}}>
                    {p.quantidade} {p.unidade} · {CATS[p.categoria]?.label||p.categoria}
                  </div>
                </div>
              </div>
            ))}
          </div>
          <button onClick={confirmarProdutosIdentificados} style={{...btnPri,marginBottom:8}}>
            Adicionar ao estoque ({Object.values(produtosSelecionados).filter(Boolean).length})
          </button>
          <button onClick={()=>{setProdutosIdentificados([]);setProdutosSelecionados({});}}
            style={btnSec}>Cancelar</button>
        </Modal>
      )}

      {modal==="log"&&(
        <Modal onClose={()=>setModal(null)} title="Log de pesquisa">
          <div style={{fontSize:"var(--fz-sm)",color:"var(--text2)",lineHeight:1.8,whiteSpace:"pre-wrap",
            fontFamily:"monospace",maxHeight:400,overflowY:"auto"}}>
            {_errosLog.length===0
              ? "Nenhuma pesquisa realizada ainda."
              : _errosLog.map((l,i)=><div key={i} style={{
                  borderBottom:"1px solid var(--border)",padding:"4px 0",
                  color:l.startsWith("OK")?("#4ade80"):("#f87171")
                }}>{l}</div>)
            }
          </div>
          <button onClick={()=>{_errosLog.length=0;setModal(null);}} style={{...btnSec,marginTop:12}}>
            Limpar log
          </button>
        </Modal>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
